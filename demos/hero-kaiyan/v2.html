<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>开眼 v2 · demo</title>
<style>
  :root{
    --mx: 50vw;
    --my: 55vh;
    --spotlight-radius: 117px;
    --texture-base-opacity: 0.022;
    --texture-real-opacity-max: 0.38;
    --crack-opacity-max: 0.07;
    --glow-base-opacity: 0.06;
    --heart-vh: 42vh;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #FAFAF8;
    color: #1A1A1A;
    font-family: "Songti SC", "STSong", serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #stage{
    position: relative;
    width: 100vw;
    height: 100dvh;
    height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  /* ---------- 1. 心脏位光晕 ---------- */
  #glow{
    position: absolute;
    left: 50%;
    top: 38vh;
    width: min(140vw, 1600px);
    height: min(140vw, 1600px);
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 50% 50%,
      #E8C97D 0%,
      rgba(232,201,125,0.65) 18%,
      #8B2E2E 42%,
      rgba(139,46,46,0.0) 72%);
    filter: blur(40px);
    opacity: var(--glow-base-opacity);
    pointer-events: none;
    will-change: opacity, transform;
    z-index: 1;
  }

  /* ---------- 2. 记忆底纹 ---------- */
  #textureLayer{
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  #textureBase, #textureReal{
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  #textureBase{
    opacity: var(--texture-base-opacity);
  }
  #textureReal{
    opacity: var(--texture-real-opacity-max);
    -webkit-mask-image: radial-gradient(circle var(--spotlight-radius) at var(--mx) var(--my), #000 0%, #000 55%, transparent 100%);
    mask-image: radial-gradient(circle var(--spotlight-radius) at var(--mx) var(--my), #000 0%, #000 55%, transparent 100%);
  }
  #textureReal.reveal-all{
    -webkit-mask-image: none;
    mask-image: none;
    opacity: 0.1;
    transition: opacity 800ms cubic-bezier(0.22,1,0.36,1);
  }
  .memory-phrase{
    position: absolute;
    white-space: nowrap;
    color: #1A1A1A;
    font-size: 12px;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  /* ---------- 3. 冰裂纹 ---------- */
  #crackSvg{
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: visible;
    transition: transform 150ms cubic-bezier(0.22,1,0.36,1);
  }
  #crackSvg.settled{ transform: translateY(1px); }
  .crack{
    fill: none;
    stroke: #1A1A1A;
    stroke-width: 0.5;
    opacity: 0;
    transition: stroke-dashoffset 600ms cubic-bezier(0.22,1,0.36,1), opacity 600ms cubic-bezier(0.22,1,0.36,1);
  }
  .crack.revealed{ opacity: var(--crack-opacity-max); }

  /* ---------- 4. 手电筒 + 光锥 ---------- */
  #torchSvg{
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    overflow: visible;
  }
  .torch-cone{ }
  .torch-body{ fill: #FAFAF8; stroke: #1A1A1A; stroke-width: 1.4; opacity: 0.82; }
  .torch-lens{ fill: none; stroke: #1A1A1A; stroke-width: 1; opacity: 0.5; }

  /* ---------- 5. 心脏（水墨图片模式，默认） ----------
     注意：mix-blend-mode 会被任何"创建 stacking context 的祖先"隔离，
     所以图片必须直接挂在 #stage 下自己定位（不能塞进带 transform 的 wrapper），
     否则 multiply 融不进页面底色。brightness(1.18) 把纸底（弱通道低至 219）
     全部钳到 255 纯白，multiply 后纸底彻底消失；saturate 排在 brightness 之后，
     充能加饱和时不会重新染回纸底。 */
  #heartImg{
    position: absolute;
    left: 50%;
    top: 38vh;
    height: var(--heart-vh);
    width: auto;
    aspect-ratio: 1600 / 1700;
    transform: translate(-50%, -50%);
    z-index: 6;
    mix-blend-mode: multiply;
    filter: brightness(1.18) saturate(1);
    pointer-events: none;
    will-change: transform, filter;
    -webkit-user-drag: none;
  }
  #heartImg.clickable{ pointer-events: auto; cursor: pointer; }

  /* ---------- 5b. 心脏（SVG 手绘回退模式：PARAMS.useInkImage=false） ---------- */
  #heartWrap{
    position: absolute;
    left: 50%;
    top: 38vh;
    height: var(--heart-vh);
    transform: translate(-50%, -50%);
    z-index: 6;
    pointer-events: none;
    will-change: transform;
  }
  #heartWrap svg{ height: 100%; width: auto; display: block; overflow: visible; }
  #heartGroup{
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }
  #heartWrap.clickable{ pointer-events: auto; cursor: pointer; }

  /* ---------- 6. 文字锁链 ---------- */
  .chain-svg{
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
  }
  #chainLayerBack{ z-index: 5; }
  #chainLayerFront{ z-index: 7; }
  #chainBackGroup{ opacity: 0.25; }
  .chain-link ellipse{
    fill: #FAFAF8;
    stroke: #1A1A1A;
    stroke-width: 1.2;
  }
  .chain-link text{
    font-family: "Songti SC", "STSong", serif;
    fill: #1A1A1A;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .chain-link.breaking{
    animation: ringBreak 600ms cubic-bezier(0.55,0,1,0.45) forwards;
  }
  .chain-link.breaking ellipse{
    transition: fill 260ms ease-out 220ms, stroke-width 260ms ease-out 220ms;
    fill: #8B2E2E;
  }
  .chain-link.breaking text{
    transition: opacity 220ms ease-out;
    opacity: 0;
  }
  @keyframes ringBreak{
    0%{ transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    100%{ transform: translate(var(--fall-x,60px), var(--fall-y,150px)) rotate(var(--fall-rot,420deg)) scale(0.25); opacity: 0; }
  }
  .chain-connector{
    fill: none;
    stroke: #1A1A1A;
    stroke-width: 1.1;
    opacity: 0.6;
  }
  .chain-connector.fading{
    transition: opacity 400ms ease-out, transform 400ms ease-out;
    opacity: 0 !important;
    transform: scale(0.4);
  }

  /* ---------- 7. 开眼大字 ---------- */
  #bigTextWrap{
    position: absolute;
    left: 50%;
    top: 75vh;
    transform: translate(-50%, -50%);
    z-index: 8;
    text-align: center;
    pointer-events: none;
  }
  #bigText{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.18em;
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: 0.04em;
  }
  .big-line{ white-space: nowrap; }
  .finale-ch{
    display: inline-block;
    color: #1A1A1A;
    opacity: 0;
    filter: blur(4px);
    transition: opacity 500ms cubic-bezier(0.22,1,0.36,1), filter 500ms cubic-bezier(0.22,1,0.36,1);
  }
  .finale-ch.lit{ opacity: 1; filter: blur(0); }

  /* ---------- 提示 ---------- */
  #hint{
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9;
    font-size: 13px;
    color: rgba(26,26,26,0.34);
    letter-spacing: 0.06em;
    text-align: center;
    pointer-events: none;
    transition: opacity 1200ms ease-out;
  }
  #hint.hidden{ opacity: 0; }

  /* ---------- 调参面板 ---------- */
  #panel{
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 20;
    width: 260px;
    padding: 14px 16px 16px;
    background: rgba(250,250,248,0.88);
    border: 1px solid rgba(26,26,26,0.15);
    border-radius: 6px;
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-size: 11px;
    color: #1A1A1A;
    backdrop-filter: blur(6px);
    display: none;
    pointer-events: auto;
  }
  #panel.open{ display: block; }
  #panel h3{ margin: 0 0 10px; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; }
  #panel label{ display: block; margin-top: 9px; color: rgba(26,26,26,0.7); }
  #panel .row{ display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #panel input[type="range"]{ width: 100%; margin-top: 3px; accent-color: #8B2E2E; }
  #panel .val{ font-variant-numeric: tabular-nums; color: rgba(26,26,26,0.5); }

  @media (prefers-reduced-motion: reduce){
    .finale-ch{ transition: opacity 1ms linear, filter 1ms linear; }
    .crack{ transition: stroke-dashoffset 1ms linear, opacity 1ms linear; }
    #crackSvg{ transition: none; }
    #glow{ transition: none !important; }
    #textureReal{ transition: none; }
    #textureReal.reveal-all{ transition: none; }
    #heartGroup{ transition: none !important; }
    .chain-link.breaking{ animation: none !important; opacity: 0; }
    .chain-connector.fading{ transition: none; }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="glow"></div>

  <div id="textureLayer">
    <div id="textureBase"></div>
    <div id="textureReal"></div>
  </div>

  <svg id="crackSvg"></svg>

  <svg id="torchSvg">
    <defs>
      <linearGradient id="coneGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="-200">
        <stop offset="0%" stop-color="#E8C97D" stop-opacity="0.16"/>
        <stop offset="100%" stop-color="#E8C97D" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <g id="torchGroup">
      <polygon id="coneShape" class="torch-cone" fill="url(#coneGrad)" points=""></polygon>
      <path class="torch-body" d="M -13,0 C -13,-4 -10,-6 -8,-6 L -8,-26 C -8,-30 -6,-32 0,-32 C 6,-32 8,-30 8,-26 L 8,-6 C 10,-6 13,-4 13,0 C 13,3 8,4 0,4 C -8,4 -13,3 -13,0 Z"></path>
      <ellipse class="torch-lens" cx="0" cy="-1" rx="9" ry="3"></ellipse>
    </g>
  </svg>

  <svg id="chainLayerBack" class="chain-svg"><g id="chainBackGroup"></g></svg>

  <img id="heartImg" src="heart-ink.png" width="1600" height="1700" alt="" draggable="false">

  <div id="heartWrap">
    <svg viewBox="-5 -8 210 236">
      <defs>
        <radialGradient id="heartFillGrad" cx="38%" cy="26%" r="85%">
          <stop offset="0%" stop-color="#8B2E2E" stop-opacity="1"/>
          <stop offset="55%" stop-color="#8B2E2E" stop-opacity="0.92"/>
          <stop offset="100%" stop-color="#8B2E2E" stop-opacity="0.78"/>
        </radialGradient>
        <filter id="dryBrush" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise"></feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.1" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
        </filter>
      </defs>
      <g id="heartGroup">
        <!-- 外轮廓填充：暗红渐变（分层） -->
        <path class="heart-fill-outer" d="M 55,60 C 46,50 46,36 58,32 C 68,29 76,36 78,44 C 82,36 92,30 104,32 C 116,34 122,44 118,53 C 133,50 148,58 154,74 C 162,94 160,116 150,138 C 142,158 130,176 116,192 C 106,203 100,210 92,202 C 78,190 64,172 54,150 C 44,128 40,104 44,84 C 46,72 50,64 55,60 Z" fill="url(#heartFillGrad)"></path>
        <!-- 更深的内部阴影层 -->
        <path id="heartInnerShadow" d="M 62,72 C 55,64 55,54 64,50 C 72,47 78,52 80,58 C 84,52 92,48 100,50 C 108,52 112,58 109,65 C 120,63 130,70 134,82 C 140,96 138,112 130,128 C 124,142 114,156 104,168 C 96,176 92,180 86,174 C 76,166 66,152 58,136 C 50,120 48,102 52,86 C 54,78 58,74 62,72 Z" fill="#1A1A1A" opacity="0.28" style="mix-blend-mode:multiply;"></path>
        <!-- 充能暖色叠层 -->
        <path id="heartFillWarm" d="M 55,60 C 46,50 46,36 58,32 C 68,29 76,36 78,44 C 82,36 92,30 104,32 C 116,34 122,44 118,53 C 133,50 148,58 154,74 C 162,94 160,116 150,138 C 142,158 130,176 116,192 C 106,203 100,210 92,202 C 78,190 64,172 54,150 C 44,128 40,104 44,84 C 46,72 50,64 55,60 Z" fill="#E8C97D" opacity="0" style="mix-blend-mode:overlay;"></path>
        <!-- 逐拍加深层 -->
        <path id="heartFillPulse" d="M 55,60 C 46,50 46,36 58,32 C 68,29 76,36 78,44 C 82,36 92,30 104,32 C 116,34 122,44 118,53 C 133,50 148,58 154,74 C 162,94 160,116 150,138 C 142,158 130,176 116,192 C 106,203 100,210 92,202 C 78,190 64,172 54,150 C 44,128 40,104 44,84 C 46,72 50,64 55,60 Z" fill="#1A1A1A" opacity="0" style="mix-blend-mode:multiply;"></path>

        <!-- 血管 -->
        <g class="heart-vessels">
          <path class="vessel-outline" d="M 106,44 C 110,20 128,6 150,8 C 168,10 178,22 174,38" stroke="#1A1A1A" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.5"></path>
          <path class="vessel-fill" d="M 106,44 C 110,20 128,6 150,8 C 168,10 178,22 174,38" stroke="#8B2E2E" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.95"></path>

          <path class="vessel-outline" d="M 88,38 C 84,20 70,10 54,14" stroke="#1A1A1A" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.45"></path>
          <path class="vessel-fill" d="M 88,38 C 84,20 70,10 54,14" stroke="#8B2E2E" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.92"></path>

          <path class="vessel-outline" d="M 116,36 C 124,26 136,20 146,24" stroke="#1A1A1A" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.4"></path>
          <path class="vessel-fill" d="M 116,36 C 124,26 136,20 146,24" stroke="#8B2E2E" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"></path>

          <path class="coronary" d="M 78,66 C 68,92 62,118 60,144" stroke="#8B2E2E" stroke-width="1.1" fill="none" opacity="0.45"></path>
          <path class="coronary" d="M 108,70 C 118,96 124,122 118,148" stroke="#8B2E2E" stroke-width="1.1" fill="none" opacity="0.45"></path>
        </g>

        <!-- 室间沟 -->
        <path class="groove" d="M 88,58 C 84,100 82,144 88,196" stroke="#1A1A1A" stroke-width="1" fill="none" opacity="0.28"></path>

        <!-- 皴笔触理 -->
        <g class="hatching">
          <path d="M 60,100 C 66,104 70,108 74,112" stroke="#1A1A1A" stroke-width="0.7" opacity="0.15" fill="none"></path>
          <path d="M 66,130 C 72,133 76,138 80,142" stroke="#1A1A1A" stroke-width="0.7" opacity="0.15" fill="none"></path>
          <path d="M 130,90 C 124,95 120,100 116,105" stroke="#1A1A1A" stroke-width="0.7" opacity="0.15" fill="none"></path>
          <path d="M 140,120 C 134,125 128,130 124,136" stroke="#1A1A1A" stroke-width="0.7" opacity="0.15" fill="none"></path>
          <path d="M 100,160 C 104,166 108,172 110,178" stroke="#1A1A1A" stroke-width="0.7" opacity="0.15" fill="none"></path>
        </g>

        <!-- 外轮廓墨线（干笔触） -->
        <path class="heart-outline" d="M 55,60 C 46,50 46,36 58,32 C 68,29 76,36 78,44 C 82,36 92,30 104,32 C 116,34 122,44 118,53 C 133,50 148,58 154,74 C 162,94 160,116 150,138 C 142,158 130,176 116,192 C 106,203 100,210 92,202 C 78,190 64,172 54,150 C 44,128 40,104 44,84 C 46,72 50,64 55,60 Z" stroke="#1A1A1A" stroke-width="2.4" fill="none" opacity="0.85" filter="url(#dryBrush)"></path>
      </g>
    </svg>
  </div>

  <svg id="chainLayerFront" class="chain-svg"><g id="chainFrontGroup"></g></svg>

  <div id="bigTextWrap">
    <div id="bigText"></div>
  </div>

  <div id="hint">移动光，靠近心脏</div>
</div>

<div id="panel">
  <h3>调参面板 (d 隐藏)</h3>

  <label>心脏尺寸 vh
    <div class="row"><input type="range" id="p-heartSize" min="24" max="60" step="1"><span class="val" id="v-heartSize"></span></div>
  </label>
  <label>链轨半径系数
    <div class="row"><input type="range" id="p-chainR" min="0.6" max="1.1" step="0.02"><span class="val" id="v-chainR"></span></div>
  </label>
  <label>静息 bpm
    <div class="row"><input type="range" id="p-restBpm" min="30" max="70" step="1"><span class="val" id="v-restBpm"></span></div>
  </label>
  <label>充能 bpm 上限
    <div class="row"><input type="range" id="p-chargeBpmMax" min="60" max="110" step="1"><span class="val" id="v-chargeBpmMax"></span></div>
  </label>
  <label>断环间隔 秒
    <div class="row"><input type="range" id="p-breakInterval" min="0.2" max="2" step="0.05"><span class="val" id="v-breakInterval"></span></div>
  </label>
  <label>底纹圈内 opacity
    <div class="row"><input type="range" id="p-textureReal" min="0" max="1" step="0.01"><span class="val" id="v-textureReal"></span></div>
  </label>
  <label>光锥宽度 px
    <div class="row"><input type="range" id="p-coneWidth" min="120" max="480" step="10"><span class="val" id="v-coneWidth"></span></div>
  </label>
</div>

<script>
(function(){
  "use strict";

  var SVG_NS = 'http://www.w3.org/2000/svg';

  /* ============================================================
     PARAMS —— 所有魔法数字集中在此，调参面板直接读写这个对象
     ============================================================ */
  var PARAMS = {
    useInkImage: true,           // true=水墨图谱图片心脏，false=SVG 手绘回退
    chainRadiusFactor: 0.82,     // 图片模式链轨半径系数（图片含留白边）
    heartSize: 42,               // 心脏高度 vh
    restBpm: 50,                 // 静息心率
    chargeBpmMax: 75,            // 充能心率上限
    breakIntervalSec: 0.7,       // 断环间隔（秒）
    textureRealOpacityMax: 0.38, // 底纹真实层在光圈内的 opacity
    coneWidth: 260,              // 光锥顶宽 px（同时决定光落点圆半径）

    textureBaseOpacity: 0.022,
    crackOpacityMax: 0.07,
    glowBaseOpacity: 0.06,
    glowBumpPeak: 0.02,
    crackHitRadius: 150,
    crackCount: 120,
    hintFadeDelay: 8000
  };

  var REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ============================================================
     DOM refs
     ============================================================ */
  var stage = document.getElementById('stage');
  var glowEl = document.getElementById('glow');
  var textureBaseEl = document.getElementById('textureBase');
  var textureRealEl = document.getElementById('textureReal');
  var crackSvg = document.getElementById('crackSvg');
  var torchSvg = document.getElementById('torchSvg');
  var torchGroup = document.getElementById('torchGroup');
  var coneShape = document.getElementById('coneShape');
  var coneGrad = document.getElementById('coneGrad');
  var heartWrap = document.getElementById('heartWrap');
  var heartImg = document.getElementById('heartImg');
  var heartGroup = document.getElementById('heartGroup');
  var heartInnerShadow = document.getElementById('heartInnerShadow');
  var heartFillWarm = document.getElementById('heartFillWarm');
  var heartFillPulse = document.getElementById('heartFillPulse');
  var chainBackGroup = document.getElementById('chainBackGroup');
  var chainFrontGroup = document.getElementById('chainFrontGroup');
  var bigTextWrap = document.getElementById('bigTextWrap');
  var bigTextEl = document.getElementById('bigText');
  var hintEl = document.getElementById('hint');
  var panel = document.getElementById('panel');

  var root = document.documentElement;

  /* ============================================================
     记忆底纹 —— 散布词句（与 v1 一致）
     ============================================================ */
  var MEMORY_PHRASES = [
    "贩卖信息是贬值资产，贩卖视角是升值资产",
    "框架是梯子，不是牢笼",
    "没有一个好的钉子，就不要买无数把锤子",
    "AI 时代最重要的是扎好马步",
    "用复盘和记录对抗遗忘",
    "人会消失，字不会",
    "我缺的不是技能，是让独特性被看见的放大器",
    "这不是我的简历，是我的思考操作系统",
    "逻辑、思辨、提问、判断",
    "营销、审美、决策判断，不可替代",
    "2,338 篇笔记，308 层目录",
    "一个月，抖音 0 → 2 万粉",
    "建造者的证据",
    "你判断 AI 输出好不好，取决于马步扎得扎不扎实",
    "我的能力有多少是 AI 给的？",
    "武林学者",
    "止损也是能力",
    "长期资产，活着的数字自我"
  ];

  function boxesOverlap(a, b, gap){
    return a.left < b.right + gap && a.right > b.left - gap &&
           a.top < b.bottom + gap && a.bottom > b.top - gap;
  }

  function buildTexture(){
    var w = window.innerWidth, h = window.innerHeight;
    var GAP = 14;
    var MAX_TRIES = 60;
    var heartR = heartWrap.getBoundingClientRect();
    var heartZone = {
      left: heartR.left - heartR.width*0.4,
      top: heartR.top - heartR.height*0.3,
      right: heartR.right + heartR.width*0.4,
      bottom: heartR.bottom + heartR.height*0.3
    };
    var bigTextZone = { left: w*0.06, top: h*0.60, right: w*0.94, bottom: h*0.92 };

    textureBaseEl.innerHTML = '';
    textureRealEl.innerHTML = '';

    var placed = [];

    for (var i=0;i<MEMORY_PHRASES.length;i++){
      var text = MEMORY_PHRASES[i];
      var size = 11 + Math.random()*3;
      var rotDeg = Math.random()*4 - 2;

      var base = document.createElement('div');
      base.className = 'memory-phrase';
      base.style.cssText = 'left:0;top:0;visibility:hidden;font-size:'+size.toFixed(1)+'px;';
      base.textContent = text;
      textureBaseEl.appendChild(base);
      var mw = base.offsetWidth;
      var mh = base.offsetHeight;

      var rad = Math.abs(rotDeg) * Math.PI / 180;
      var ebw = mw * Math.cos(rad) + mh * Math.sin(rad);
      var ebh = mw * Math.sin(rad) + mh * Math.cos(rad);

      var box = null;
      for (var tries=0; tries<MAX_TRIES; tries++){
        var left = 4 + Math.random() * Math.max(1, w - ebw - 8);
        var top = 4 + Math.random() * Math.max(1, h - ebh - 8);
        var cand = { left: left, top: top, right: left + ebw, bottom: top + ebh };
        if (boxesOverlap(cand, heartZone, 0)) continue;
        if (boxesOverlap(cand, bigTextZone, 0)) continue;
        var collided = false;
        for (var p=0; p<placed.length; p++){
          if (boxesOverlap(cand, placed[p], GAP)){ collided = true; break; }
        }
        if (!collided){ box = cand; break; }
      }
      if (!box){
        textureBaseEl.removeChild(base);
        continue;
      }

      placed.push(box);

      var elLeft = box.left + (ebw - mw) / 2;
      var elTop = box.top + (ebh - mh) / 2;
      var styleStr = 'left:'+elLeft.toFixed(1)+'px;top:'+elTop.toFixed(1)+'px;'+
                      'transform:rotate('+rotDeg.toFixed(2)+'deg);font-size:'+size.toFixed(1)+'px;';

      base.style.cssText = styleStr;

      var real = document.createElement('div');
      real.className = 'memory-phrase';
      real.style.cssText = styleStr;
      real.textContent = text;
      textureRealEl.appendChild(real);
    }
  }

  /* ============================================================
     开眼大字（终局才出现）
     ============================================================ */
  var FINALE_LINES = ["你想要", "怎样活这一生？"];

  function buildFinaleText(){

    FINALE_LINES.forEach(function(lineText){
      var line = document.createElement('div');

  function revealFinaleText(){

    var idx = 0;

  function revealFinaleTextInstant(){

  /* ============================================================
     文字锁链 —— 把断句拆成两条环绕心脏的链
     ============================================================ */
  var CHAIN_PHRASE = "人不能活一辈子。最后只有两个字——严父，或者慈母。";
  var CHAIN_CHARS = CHAIN_PHRASE.replace(/[。，—]/g, '').split('');

  var allLinks = [];      // { g, ellipse, text, x, y, chain, broken, index }
  var allConnectors = []; // { el, aIndex, bIndex }
  var totalBrokenCount = 0;
  var heartHitRect = null;
  var heartCenterPx = { x: 0, y: 0 };

  function heartBodyRect(){
    if (PARAMS.useInkImage){
      // 图片四周有留白，链轨按系数向心收紧
      var r = heartImg.getBoundingClientRect();
      var f = PARAMS.chainRadiusFactor;
      var dw = r.width * (1 - f) / 2, dh = r.height * (1 - f) / 2;
      return { left: r.left + dw, top: r.top + dh, right: r.right - dw,
               bottom: r.bottom - dh, width: r.width * f, height: r.height * f };
    }
    var bodyEl = document.querySelector('.heart-fill-outer');
    return bodyEl ? bodyEl.getBoundingClientRect() : heartWrap.getBoundingClientRect();
  }

  // 心跳缩放统一入口：SVG 模式作用在 heartGroup，图片模式作用在 heartImg
  // （heartImg 的基础 transform 是 translate(-50%,-50%)，缩放必须与其复合）
  function setHeartScale(s, transition){
    var t = (transition === undefined) ? '' : transition;
    if (PARAMS.useInkImage){
      heartImg.style.transition = t ? ('transform ' + t) : '';
      heartImg.style.transform = 'translate(-50%,-50%) scale(' + s + ')';
    } else {
      heartGroup.style.transition = t ? ('transform ' + t) : '';
      heartGroup.style.transform = 'scale(' + s + ')';
    }
  }

  function chainLinkPos(tiltRad, t, heartR){
    var cx = heartR.left + heartR.width/2;
    var cy = heartR.top + heartR.height/2;
    var Rx = heartR.width * 0.66;
    var Ry = heartR.height * 0.66;
    var squash = 0.5;
    var theta = t * Math.PI * 2;
    var lx = Rx * Math.cos(theta);
    var ly = Ry * Math.sin(theta) * squash;
    var depth = Math.sin(theta);
    var cosT = Math.cos(tiltRad), sinT = Math.sin(tiltRad);
    var x = cx + lx*cosT - ly*sinT;
    var y = cy + lx*sinT + ly*cosT;
    return { x: x, y: y, depth: depth };
  }

  function makeLinkEl(pos, ch, layerGroup){
    var g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'chain-link');
    g.style.transformOrigin = pos.x.toFixed(1) + 'px ' + pos.y.toFixed(1) + 'px';

    var ellipse = document.createElementNS(SVG_NS, 'ellipse');
    ellipse.setAttribute('cx', pos.x.toFixed(1));
    ellipse.setAttribute('cy', pos.y.toFixed(1));
    ellipse.setAttribute('rx', 17);
    ellipse.setAttribute('ry', 12);
    g.appendChild(ellipse);

    var text = document.createElementNS(SVG_NS, 'text');
    text.setAttribute('x', pos.x.toFixed(1));
    text.setAttribute('y', pos.y.toFixed(1));
    text.setAttribute('font-size', 19);
    text.textContent = ch;
    g.appendChild(text);

    layerGroup.appendChild(g);
    return { g: g, ellipse: ellipse, text: text };
  }

  function makeConnectorEl(pos, layerGroup){
    var c = document.createElementNS(SVG_NS, 'circle');
    c.setAttribute('class', 'chain-connector');
    c.setAttribute('cx', pos.x.toFixed(1));
    c.setAttribute('cy', pos.y.toFixed(1));
    c.setAttribute('r', 5);
    layerGroup.appendChild(c);
    return c;
  }

  function buildChains(){
    chainBackGroup.innerHTML = '';
    chainFrontGroup.innerHTML = '';
    allLinks = [];
    allConnectors = [];
    totalBrokenCount = 0;

    var heartR = heartBodyRect();
    var half = Math.ceil(CHAIN_CHARS.length/2);
    var chainA = CHAIN_CHARS.slice(0, half);
    var chainB = CHAIN_CHARS.slice(half);
    var chains = [
      { chars: chainA, tilt: 35 * Math.PI/180, offset: 0.02 },
      { chars: chainB, tilt: -35 * Math.PI/180, offset: 0.52 }
    ];

    var globalIndex = 0;
    chains.forEach(function(chainDef, chainId){
      var n = chainDef.chars.length;
      var chainLinks = [];
      for (var i=0;i<n;i++){
        var t = (i/n) + chainDef.offset;
        var pos = chainLinkPos(chainDef.tilt, t, heartR);
        var layer = pos.depth >= 0 ? chainFrontGroup : chainBackGroup;
        var made = makeLinkEl(pos, chainDef.chars[i], layer);
        var link = {
          g: made.g, ellipse: made.ellipse, text: made.text,
          x: pos.x, y: pos.y, t: t, tilt: chainDef.tilt,
          chain: chainId, broken: false, index: globalIndex
        };
        allLinks.push(link);
        chainLinks.push(link);
        globalIndex++;
      }
      // 环间连接环
      for (var j=0;j<chainLinks.length-1;j++){
        var lA = chainLinks[j], lB = chainLinks[j+1];
        var mx = (lA.x + lB.x)/2, my = (lA.y + lB.y)/2;
        var depthMid = (Math.sin(lA.t*Math.PI*2) + Math.sin(lB.t*Math.PI*2)) / 2;
        var layer = depthMid >= 0 ? chainFrontGroup : chainBackGroup;
        var el = makeConnectorEl({ x: mx, y: my }, layer);
        allConnectors.push({ el: el, aIndex: lA.index, bIndex: lB.index });
      }
    });
  }

  function layoutChains(){
    // resize 时仅重新定位尚未断开的环，不重建 DOM / 不丢失已断状态
    var heartR = heartBodyRect();
    allLinks.forEach(function(link){
      if (link.broken) return;
      var pos = chainLinkPos(link.tilt, link.t, heartR);
      link.x = pos.x; link.y = pos.y;
      link.ellipse.setAttribute('cx', pos.x.toFixed(1));
      link.ellipse.setAttribute('cy', pos.y.toFixed(1));
      link.text.setAttribute('x', pos.x.toFixed(1));
      link.text.setAttribute('y', pos.y.toFixed(1));
      link.g.style.transformOrigin = pos.x.toFixed(1) + 'px ' + pos.y.toFixed(1) + 'px';
    });
    heartHitRect = {
      left: heartR.left - heartR.width*0.1,
      top: heartR.top - heartR.height*0.1,
      right: heartR.right + heartR.width*0.1,
      bottom: heartR.bottom + heartR.height*0.1
    };
    heartCenterPx = { x: heartR.left + heartR.width/2, y: heartR.top + heartR.height/2 };
    chainBackGroup.style.transformOrigin = heartCenterPx.x.toFixed(1) + 'px ' + heartCenterPx.y.toFixed(1) + 'px';
    chainFrontGroup.style.transformOrigin = heartCenterPx.x.toFixed(1) + 'px ' + heartCenterPx.y.toFixed(1) + 'px';
  }

  function fadeConnectorsFor(link){
    allConnectors.forEach(function(c){
      if (c.aIndex === link.index || c.bIndex === link.index){
        if (c.el.classList.contains('fading')) return;
        var otherIndex = c.aIndex === link.index ? c.bIndex : c.aIndex;
        var other = allLinks[otherIndex];
        if (other && !other.broken) return; // 另一端还在，先不淡出
        c.el.classList.add('fading');
        setTimeout(function(){ if (c.el.parentNode) c.el.parentNode.removeChild(c.el); }, 420);
      }
    });
  }

  function breakLink(link){
    if (link.broken) return;
    link.broken = true;
    totalBrokenCount++;

    var fallX = (Math.random()*160 - 80).toFixed(1);
    var fallY = (120 + Math.random()*80).toFixed(1);
    var fallRot = ((360 + Math.random()*360) * (Math.random()<0.5?-1:1)).toFixed(0);
    link.g.style.setProperty('--fall-x', fallX + 'px');
    link.g.style.setProperty('--fall-y', fallY + 'px');
    link.g.style.setProperty('--fall-rot', fallRot + 'deg');

    if (REDUCED_MOTION){
      if (link.g.parentNode) link.g.parentNode.removeChild(link.g);
    } else {
      link.g.classList.add('breaking');
      setTimeout(function(){
        if (link.g.parentNode) link.g.parentNode.removeChild(link.g);
      }, 650);
    }

    fadeConnectorsFor(link);

    if (totalBrokenCount === allLinks.length){
      onAllRingsBroken();
    }
  }

  function breakNearestLink(fx, fy){
    var nearest = null, nearestD = Infinity;
    for (var i=0;i<allLinks.length;i++){
      var l = allLinks[i];
      if (l.broken) continue;
      var dx = l.x - fx, dy = l.y - fy;
      var d = dx*dx + dy*dy;
      if (d < nearestD){ nearestD = d; nearest = l; }
    }
    if (nearest) breakLink(nearest);
  }

  /* ============================================================
     冰裂纹（与 v1 一致）
     ============================================================ */
  var cracks = [];

  function buildCracks(){
    crackSvg.innerHTML = '';
    cracks = [];
    var w = window.innerWidth, h = window.innerHeight;
    var n = PARAMS.crackCount;

    for (var i=0;i<n;i++){
      var segCount = 3 + Math.floor(Math.random()*4);
      var targetLen = 60 + Math.random()*160;
      var avgSeg = targetLen/segCount;
      var x = Math.random()*w, y = Math.random()*h;
      var angle = Math.random()*Math.PI*2;
      var pts = [[x,y]];
      var sumX = x, sumY = y;
      for (var s=0;s<segCount;s++){
        var len = avgSeg * (0.65 + Math.random()*0.7);
        angle += (Math.random()*1.4 - 0.7);
        x += Math.cos(angle)*len;
        y += Math.sin(angle)*len;
        pts.push([x,y]);
        sumX += x; sumY += y;
      }
      var cx = sumX/(segCount+1), cy = sumY/(segCount+1);

      var ptsStr = pts.map(function(p){ return p[0].toFixed(1)+','+p[1].toFixed(1); }).join(' ');
      var pl = document.createElementNS(SVG_NS,'polyline');
      pl.setAttribute('points', ptsStr);
      pl.setAttribute('class', 'crack');
      crackSvg.appendChild(pl);

      var len = pl.getTotalLength();
      pl.style.strokeDasharray = len;
      pl.style.strokeDashoffset = len;

      cracks.push({ el: pl, cx: cx, cy: cy, len: len, revealed: false });
    }
  }

  function revealCrack(c, instant){
    if (c.revealed) return;
    c.revealed = true;
    if (instant || REDUCED_MOTION){
      c.el.style.transition = 'none';
    } else {
      c.el.style.transition = '';
    }
    c.el.style.strokeDashoffset = 0;
    c.el.classList.add('revealed');
    if (instant || REDUCED_MOTION){
      void c.el.offsetWidth;
      c.el.style.transition = '';
    }
  }

  function hitTestCracks(fx, fy){
    var r2 = PARAMS.crackHitRadius * PARAMS.crackHitRadius;
    for (var i=0;i<cracks.length;i++){
      var c = cracks[i];
      if (c.revealed) continue;
      var dx = c.cx - fx, dy = c.cy - fy;
      if (dx*dx + dy*dy <= r2){
        revealCrack(c);
      }
    }
  }

  /* ============================================================
     手电筒 / 光锥
     ============================================================ */
  var W = window.innerWidth, H = window.innerHeight;
  var mouthY = H - 46;
  var spotlightY = H * 0.55;
  var spotlightRadius = PARAMS.coneWidth * 0.45;
  var TORCH_MARGIN = 40;

  function computeLayout(){
    W = window.innerWidth; H = window.innerHeight;
    mouthY = H - 46;
    spotlightY = H * 0.55;
    updateConeShape();
    root.style.setProperty('--my', spotlightY.toFixed(1)+'px');
  }

  function updateConeShape(){
    spotlightRadius = PARAMS.coneWidth * 0.45;
    root.style.setProperty('--spotlight-radius', spotlightRadius.toFixed(1)+'px');
    var localTopY = spotlightY - mouthY; // 负值，向上
    var half = PARAMS.coneWidth / 2;
    var pts = [
      '-11,-2', '11,-2',
      half.toFixed(1)+','+localTopY.toFixed(1),
      (-half).toFixed(1)+','+localTopY.toFixed(1)
    ].join(' ');
    coneShape.setAttribute('points', pts);
    coneGrad.setAttribute('y2', localTopY.toFixed(1));
  }

  /* ============================================================
     指针 / 触摸
     ============================================================ */
  var pointerX = window.innerWidth * 0.5;
  var userHasMoved = false;

  function onPointerMove(x){ pointerX = x; userHasMoved = true; }

  window.addEventListener('mousemove', function(e){ onPointerMove(e.clientX); }, { passive: true });
  window.addEventListener('touchmove', function(e){
    if (e.touches && e.touches.length) onPointerMove(e.touches[0].clientX);
  }, { passive: true });
  window.addEventListener('touchstart', function(e){
    if (e.touches && e.touches.length) onPointerMove(e.touches[0].clientX);
  }, { passive: true });

  /* ============================================================
     心跳：lub-dub，幅度/频率随充能进度变化
     ============================================================ */
  function easeOut(t){ return 1 - Math.pow(1-t, 3); }

  function heartScaleAt(phase, amp){
    var mainAmp = 0.045 * amp;
    var secAmp = 0.022 * amp;
    if (phase < 120){
      var p = phase/120;
      return 1 + mainAmp * easeOut(p);
    } else if (phase < 400){
      var p2 = (phase-120)/280;
      return 1 + mainAmp - mainAmp * easeOut(p2);
    } else if (phase < 460){
      return 1;
    } else if (phase < 520){
      var p3 = (phase-460)/60;
      return 1 + secAmp * easeOut(p3);
    } else if (phase < 660){
      var p4 = (phase-520)/140;
      return 1 + secAmp - secAmp * easeOut(p4);
    }
    return 1;
  }

  var beatTime = 0;
  var lastTs = null;
  var pauseBeatUntil = 0;
  var glowBloomActive = false;
  var glowBaselineRuntime = PARAMS.glowBaseOpacity;
  var kaiyanFired = false;
  var chargeElapsed = 0;

  function triggerBigBeatHold(){
    pauseBeatUntil = Infinity;
    setHeartScale('1.09', '150ms cubic-bezier(0.22,1,0.36,1)');
    setTimeout(function(){
      setHeartScale('1', '400ms cubic-bezier(0.22,1,0.36,1)');
      setTimeout(function(){
        setHeartScale('1');
        beatTime = 0;
        pauseBeatUntil = 0;
      }, 420);
    }, 950);
  }

  function onAllRingsBroken(){
    if (kaiyanFired) return;
    kaiyanFired = true;

    allConnectors.forEach(function(c){
      if (!c.el.parentNode) return;
      c.el.classList.add('fading');
      setTimeout(function(){ if (c.el.parentNode) c.el.parentNode.removeChild(c.el); }, 420);
    });

    if (REDUCED_MOTION){
      heartFillWarm.style.opacity = '0.7';
      glowBaselineRuntime = 0.12;
      glowEl.style.opacity = glowBaselineRuntime.toFixed(4);
      revealFinaleTextInstant();
      return;
    }

    triggerBigBeatHold();

    glowBloomActive = true;
    glowEl.style.transition = 'opacity 1200ms cubic-bezier(0.22,1,0.36,1), transform 1200ms cubic-bezier(0.22,1,0.36,1)';
    glowEl.style.opacity = '0.30';
    glowEl.style.transform = 'translate(-50%,-50%) scale(1.2)';
    setTimeout(function(){
      glowEl.style.transition = 'opacity 500ms cubic-bezier(0.22,1,0.36,1), transform 500ms cubic-bezier(0.22,1,0.36,1)';
      glowEl.style.opacity = '0.12';
      glowEl.style.transform = 'translate(-50%,-50%) scale(1)';
      glowBaselineRuntime = 0.12;
      setTimeout(function(){
        glowEl.style.transition = '';
        glowBloomActive = false;
      }, 520);
    }, 1200);

    setTimeout(function(){
      textureRealEl.classList.add('reveal-all');
      setTimeout(function(){
        textureRealEl.classList.remove('reveal-all');
      }, 800);
    }, 300);

    setTimeout(function(){
      revealFinaleText();
    }, 1350);
  }

  /* ============================================================
     主循环
     ============================================================ */
  function mainFrame(ts){
    if (lastTs == null) lastTs = ts;
    var dt = ts - lastTs;
    lastTs = ts;
    if (dt > 80) dt = 80; // 防止后台节流/卡顿导致的大 dt 跳变一次性推穿多个断环阈值

    var fx = Math.max(TORCH_MARGIN, Math.min(pointerX, W - TORCH_MARGIN));
    torchGroup.setAttribute('transform', 'translate('+fx.toFixed(1)+','+mouthY.toFixed(1)+')');
    root.style.setProperty('--mx', fx.toFixed(1)+'px');

    hitTestCracks(fx, spotlightY);

    if (!REDUCED_MOTION){
      var intersecting = false;
      if (!kaiyanFired && heartHitRect && userHasMoved){
        var nx = Math.max(heartHitRect.left, Math.min(fx, heartHitRect.right));
        var ny = Math.max(heartHitRect.top, Math.min(spotlightY, heartHitRect.bottom));
        var ddx = fx - nx, ddy = spotlightY - ny;
        intersecting = (ddx*ddx + ddy*ddy) <= (spotlightRadius*spotlightRadius);
      }

      if (intersecting){
        chargeElapsed += dt;
        var intervalMs = PARAMS.breakIntervalSec * 1000;
        var guard = 0;
        while (chargeElapsed >= intervalMs && !kaiyanFired && guard < 30){
          chargeElapsed -= intervalMs;
          breakNearestLink(fx, spotlightY);
          guard++;
        }
      }

      var fraction = allLinks.length ? Math.min(1, totalBrokenCount/allLinks.length) : 0;
      var bpm = PARAMS.restBpm + (PARAMS.chargeBpmMax - PARAMS.restBpm) * fraction;

      if (ts >= pauseBeatUntil){
        beatTime += dt;
        var Tc = 60000 / Math.max(1, bpm);
        var phase = beatTime % Tc;
        var ampFactor = 1 + fraction * 0.8;
        var s = heartScaleAt(phase, ampFactor);
        setHeartScale(s.toFixed(4));

        var pulseNorm = Math.max(0, (s-1)) / (0.045 * ampFactor);
        heartFillPulse.style.opacity = (pulseNorm * 0.4).toFixed(3);

        var warmBase = fraction * 0.55;
        var warm = Math.min(0.9, warmBase + pulseNorm * fraction * 0.3);
        heartFillWarm.style.opacity = warm.toFixed(3);
        if (PARAMS.useInkImage){
          // 图片模式充能变暖：只动明度/饱和，不跑色相
          heartImg.style.filter = 'brightness(' + (1.18 + warm * 0.05).toFixed(3) +
                                  ') saturate(' + (1 + warm * 0.45).toFixed(3) + ')';
        }

        var chainScale = 1 + Math.max(0, (s-1)) * 0.22;
        chainBackGroup.style.transform = 'scale(' + chainScale.toFixed(4) + ')';
        chainFrontGroup.style.transform = 'scale(' + chainScale.toFixed(4) + ')';

        if (!glowBloomActive){
          var bump = pulseNorm * PARAMS.glowBumpPeak;
          glowEl.style.opacity = (glowBaselineRuntime + bump).toFixed(4);
        }
      }
    }

    requestAnimationFrame(mainFrame);
  }

  /* ============================================================
     提示语自动淡出
     ============================================================ */
  function initHint(){
    setTimeout(function(){ hintEl.classList.add('hidden'); }, PARAMS.hintFadeDelay);
  }

  /* ============================================================
     reduced-motion：点击心脏直接断链
     ============================================================ */
  function initReducedMotionClick(){
    var heartClickEl = PARAMS.useInkImage ? heartImg : heartWrap;
    heartClickEl.classList.add('clickable');
    heartClickEl.addEventListener('click', function(){
      if (kaiyanFired) return;
      allLinks.forEach(function(l){
        if (!l.broken){
          l.broken = true;
          totalBrokenCount++;
          if (l.g.parentNode) l.g.parentNode.removeChild(l.g);
        }
      });
      onAllRingsBroken();
    });
  }

  /* ============================================================
     调参面板
     ============================================================ */
  function initPanel(){
    var map = [
      { id: 'p-heartSize', val: 'v-heartSize', key: 'heartSize', decimals: 0, onChange: function(v){ root.style.setProperty('--heart-vh', v+'vh'); } },
      { id: 'p-chainR', val: 'v-chainR', key: 'chainRadiusFactor', decimals: 2, onChange: function(){ layoutChains(); } },
      { id: 'p-restBpm', val: 'v-restBpm', key: 'restBpm', decimals: 0 },
      { id: 'p-chargeBpmMax', val: 'v-chargeBpmMax', key: 'chargeBpmMax', decimals: 0 },
      { id: 'p-breakInterval', val: 'v-breakInterval', key: 'breakIntervalSec', decimals: 2 },
      { id: 'p-textureReal', val: 'v-textureReal', key: 'textureRealOpacityMax', decimals: 2, onChange: function(v){ root.style.setProperty('--texture-real-opacity-max', v); } },
      { id: 'p-coneWidth', val: 'v-coneWidth', key: 'coneWidth', decimals: 0, onChange: function(){ updateConeShape(); } }
    ];

    map.forEach(function(m){
      var input = document.getElementById(m.id);
      var out = document.getElementById(m.val);
      input.value = PARAMS[m.key];
      out.textContent = Number(PARAMS[m.key]).toFixed(m.decimals);
      input.addEventListener('input', function(){
        var v = parseFloat(input.value);
        PARAMS[m.key] = v;
        out.textContent = v.toFixed(m.decimals);
        if (m.onChange) m.onChange(v);
      });
    });

    window.addEventListener('keydown', function(e){
      if (e.key === 'd' || e.key === 'D'){
        panel.classList.toggle('open');
      }
    });
  }

  /* ============================================================
     resize
     ============================================================ */
  var resizeTimer = null;
  function onResize(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      computeLayout();
      buildTexture();
      layoutChains();
      if (!kaiyanFired){
        buildCracks();
      }
    }, 200);
  }
  window.addEventListener('resize', onResize);

  /* ============================================================
     init
     ============================================================ */
  function init(){
    // 心脏渲染模式二选一：水墨图谱图片 or SVG 手绘回退
    if (PARAMS.useInkImage){ heartWrap.style.display = 'none'; }
    else { heartImg.style.display = 'none'; }
    root.style.setProperty('--texture-base-opacity', PARAMS.textureBaseOpacity);
    root.style.setProperty('--texture-real-opacity-max', PARAMS.textureRealOpacityMax);
    root.style.setProperty('--crack-opacity-max', PARAMS.crackOpacityMax);
    root.style.setProperty('--glow-base-opacity', PARAMS.glowBaseOpacity);
    root.style.setProperty('--heart-vh', PARAMS.heartSize + 'vh');

    computeLayout();
    buildTexture();
    buildFinaleText();
    buildChains();
    layoutChains();
    buildCracks();
    initHint();
    initPanel();

    // 手电筒默认落位（避免 reduced-motion 下 mainFrame 不跑导致它停在 SVG 原点）
    var initFx = Math.max(TORCH_MARGIN, Math.min(pointerX, W - TORCH_MARGIN));
    torchGroup.setAttribute('transform', 'translate('+initFx.toFixed(1)+','+mouthY.toFixed(1)+')');
    root.style.setProperty('--mx', initFx.toFixed(1)+'px');

    if (REDUCED_MOTION){
      setHeartScale('1');
      glowEl.style.opacity = PARAMS.glowBaseOpacity;
      initReducedMotionClick();
    } else {
      requestAnimationFrame(mainFrame);
    }
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
